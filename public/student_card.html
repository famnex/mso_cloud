<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MSO Digitaler Schülerausweis</title>
  
  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MSO Ausweis">
  
  <!-- Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- QRCode.js Library -->
  <script src="assets/qrcode.min.js"></script>

  <style>
    :root {
      --bg-dark: #090d16;
      --card-bg: rgba(17, 25, 40, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6; /* Wird dynamisch überschrieben */
      --accent-glow: rgba(59, 130, 246, 0.35);
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
    }

    /* Background Animation */
    body::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
      animation: rotateBg 25s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Top Bar Controls */
    .top-controls {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .back-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
      transition: all 0.2s ease;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    /* Language Switcher */
    .lang-switcher {
      display: flex;
      gap: 5px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      padding: 4px;
      border-radius: 30px;
      backdrop-filter: blur(10px);
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 6px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* Card Perspective Frame */
    .card-container {
      perspective: 1000px;
      width: 100%;
      max-width: 340px;
      z-index: 10;
      margin-top: 60px;
      margin-bottom: 20px;
    }

    /* Hochkant Plastikkarte */
    .student-card {
      width: 100%;
      height: 520px; /* Hochformat proportional (ca 1:1.55) */
      background: var(--card-bg);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border: 1.5px solid var(--card-border);
      border-radius: 24px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6),
                  0 0 35px var(--accent-glow);
      transform-style: preserve-3d;
      transition: transform 0.08s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Shimmer overlay */
    .student-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.06) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 5;
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .student-card:hover::after {
      transform: translateX(100%);
    }

    /* Card Header */
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 12px;
    }

    .school-logo-img {
      height: 38px;
      max-width: 60px;
      object-fit: contain;
    }

    .school-logo-placeholder {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 1.2rem;
      border: 1px solid var(--accent);
    }

    .school-info {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .school-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1.2;
    }

    .card-badge {
      align-self: center;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 10px;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* Card Body - Profile Data & Portrait */
    .card-body {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }

    .photo-wrapper {
      width: 105px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.1);
      background: #151f32;
      flex-shrink: 0;
      position: relative;
    }

    .photo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder-avatar {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 2.8rem;
    }

    .details-wrapper {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-grow: 1;
      justify-content: center;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1px;
    }

    .detail-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .detail-value.name {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.2;
    }

    /* Schulleiter-Unterschrift & Siegel-Zone */
    .signature-seal-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin: 10px 0;
      position: relative;
    }

    .principal-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-width: 170px;
    }

    .signature-wrapper {
      height: 42px;
      display: flex;
      align-items: center;
      margin-bottom: 2px;
    }

    .signature-img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.4));
    }

    .signature-placeholder {
      font-family: 'Brush Script MT', cursive, sans-serif;
      font-size: 1.3rem;
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* Hologram Siegel */
    .hologram-siegel {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px dashed rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: rgba(255,255,255,0.65);
      box-shadow: 0 0 12px rgba(255,255,255,0.08);
      transition: transform 0.1s ease;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .hologram-siegel i {
      animation: spinSiegel 12s linear infinite;
    }

    @keyframes spinSiegel {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* QR-Code & Validity Zone */
    .card-footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qr-container-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .qr-code-box {
      width: 72px;
      height: 72px;
      background: #ffffff;
      padding: 4px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      flex-shrink: 0;
    }

    .validity-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-grow: 1;
    }

    .live-ticker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 5px 8px;
      border: 1px solid rgba(255,255,255,0.03);
    }

    .ticker-label {
      font-size: 0.6rem;
      color: var(--success);
      font-weight: 800;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .ticker-label::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--success);
      animation: pulseGreen 1.5s infinite;
    }

    @keyframes pulseGreen {
      0% { opacity: 0.4; }
      50% { opacity: 1; }
      100% { opacity: 0.4; }
    }

    .ticker-time {
      font-family: monospace;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
    }

    .expiry-text {
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .expiry-text strong {
      color: var(--text);
    }

    /* Revoked / Error overlay screen */
    .revoked-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 15, 30, 0.96);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 25px;
      text-align: center;
      border-radius: 24px;
      backdrop-filter: blur(15px);
    }

    .revoked-icon {
      font-size: 3.5rem;
      color: var(--danger);
      margin-bottom: 15px;
      animation: shake 0.6s ease-in-out infinite alternate;
    }

    @keyframes shake {
      0% { transform: rotate(-6deg); }
      100% { transform: rotate(6deg); }
    }

    .revoked-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .revoked-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Offline banner */
    .offline-banner {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid #f59e0b;
      color: #fbbf24;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 15px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Top Bar Controls -->
  <div class="top-controls">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="backBtn">Portal</span></a>
    
    <!-- Language Toggle -->
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="switchLanguage('de')">DE</button>
      <button class="lang-btn" onclick="switchLanguage('en')">EN</button>
      <button class="lang-btn" onclick="switchLanguage('fr')">FR</button>
    </div>
  </div>

  <!-- PWA Offline Banner -->
  <div id="offline-banner" class="offline-banner">
    <i class="fa-solid fa-cloud-sun"></i> <span data-i18n="offlineMode">Offline-Modus active</span>
  </div>

  <!-- Card Frame container -->
  <div class="card-container" id="card-frame">
    
    <!-- Student Card -->
    <div class="student-card" id="student-card">
      
      <!-- Revocation / Error Overlays -->
      <div class="revoked-overlay" id="revoked-overlay">
        <i class="fa-solid fa-circle-xmark revoked-icon" id="overlay-icon"></i>
        <div class="revoked-title" id="overlay-title">-</div>
        <div class="revoked-desc" id="overlay-desc">-</div>
      </div>
      
      <!-- Card Header -->
      <div class="card-header">
        <!-- School Logo -->
        <div id="school-logo-container">
          <div class="school-logo-placeholder"><i class="fa-solid fa-graduation-cap"></i></div>
        </div>
        <div class="school-info">
          <div class="school-title" id="school-title-display">Modellschule Obersberg</div>
        </div>
        <div class="card-badge" data-i18n="studentBadge">Schüler</div>
      </div>

      <!-- Card Body - Photo & Info -->
      <div class="card-body">
        <!-- Photo -->
        <div class="photo-wrapper">
          <div id="card-photo-container">
            <div class="placeholder-avatar"><i class="fa-solid fa-user"></i></div>
          </div>
        </div>

        <!-- Details -->
        <div class="details-wrapper">
          <div class="detail-item">
            <span class="detail-label" data-i18n="labelName">Name, Vorname</span>
            <span class="detail-value name" id="card-name">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label" data-i18n="labelBirth">Geburtsdatum</span>
            <span class="detail-value" id="card-birth">-</span>
          </div>
          <div class="detail-item">
            <span class="detail-label" data-i18n="labelBirthplace">Geburtsort</span>
            <span class="detail-value" id="card-birthplace">-</span>
          </div>
        </div>
      </div>

      <!-- Schulleiter-Unterschrift & Siegel -->
      <div class="signature-seal-area">
        <div class="principal-container">
          <div class="signature-wrapper" id="signature-container">
            <span class="signature-placeholder">Unterschrift</span>
          </div>
          <span class="detail-label" data-i18n="labelPrincipal">Schulleiter</span>
          <span class="detail-value" style="font-size: 0.75rem;" id="principal-name-display">OStD Karsten Backhaus</span>
        </div>

        <!-- Hologram Siegel -->
        <div class="hologram-siegel" id="hologram">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
      </div>

      <!-- Card Footer - QR & Live Validation -->
      <div class="card-footer">
        <div class="qr-container-wrapper">
          <!-- QR Code Mediotheksnummer -->
          <div class="qr-code-box" id="qrcode-box" title="Scan Mediotheksnummer"></div>

          <div class="validity-block">
            <!-- Live Clock -->
            <div class="live-ticker">
              <div class="ticker-label" data-i18n="labelValid">Gültig</div>
              <div class="ticker-time" id="ticker-time">00:00:00.000</div>
            </div>

            <!-- Expiry & Status info -->
            <div class="expiry-text">
              <span><span data-i18n="labelExpiry">Gültig bis:</span> <strong id="card-expiry">-</strong></span>
              <span>Status: <strong style="color:var(--success); font-weight:700;" id="card-status-label">Online</strong></span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registriert!'))
          .catch(err => console.error('Service Worker Fehler:', err));
      });
    }

    // Translations Dictionary
    const translations = {
      de: {
        backBtn: "Portal",
        offlineMode: "Offline-Modus aktiv (Lokaler Ausweis)",
        studentBadge: "Schüler",
        labelName: "Name, Vorname",
        labelBirth: "Geburtsdatum",
        labelBirthplace: "Geburtsort",
        labelPrincipal: "Schulleiter/in",
        labelValid: "Gültig",
        labelExpiry: "Gültig bis:",
        statusOnline: "Online verifiziert",
        statusOffline: "Offline verifiziert",
        revokedTitle: "Ausweis gesperrt",
        revokedDesc: "Dieser digitale Schülerausweis wurde serverseitig ungültig geschaltet oder gesperrt. Wenden Sie sich bei Fragen an das Sekretariat.",
        expiredTitle: "Ausweis abgelaufen",
        expiredDesc: "Dieser digitale Schülerausweis ist abgelaufen. Bitte verbinden Sie sich mit dem Internet, um ihn zu erneuern.",
        noPhotoTitle: "Kein Foto hinterlegt",
        noPhotoDesc: "Für Ihren Schülerausweis wurde noch kein Passbild hochgeladen. Bitte laden Sie ein Foto im MSO Cloud Profil hoch, um den Ausweis zu aktivieren.",
        photoPendingTitle: "Foto ungeprüft",
        photoPendingDesc: "Ihr hochgeladenes Passbild wird derzeit von der Verwaltung geprüft. Sobald das Foto verifiziert ist, wird Ihr Ausweis freigeschaltet."
      },
      en: {
        backBtn: "Lobby",
        offlineMode: "Offline Mode Active (Cached Card)",
        studentBadge: "Student",
        labelName: "Name, Surname",
        labelBirth: "Date of Birth",
        labelBirthplace: "Place of Birth",
        labelPrincipal: "Principal",
        labelValid: "Valid",
        labelExpiry: "Valid until:",
        statusOnline: "Online Verified",
        statusOffline: "Offline Verified",
        revokedTitle: "ID Card Blocked",
        revokedDesc: "This digital student ID card has been deactivated or blocked by the administration. Please contact the office.",
        expiredTitle: "ID Card Expired",
        expiredDesc: "This digital student ID card has expired. Please connect to the internet to renew it.",
        noPhotoTitle: "No Photo Uploaded",
        noPhotoDesc: "No portrait photo has been uploaded yet. Please upload a photo in your MSO Cloud profile to activate the ID card.",
        photoPendingTitle: "Photo Pending",
        photoPendingDesc: "Your uploaded photo is currently under review by the administration. Your card will be unlocked once approved."
      },
      fr: {
        backBtn: "Portail",
        offlineMode: "Mode hors ligne actif (carte mise en cache)",
        studentBadge: "Élève",
        labelName: "Nom, Prénom",
        labelBirth: "Date de naissance",
        labelBirthplace: "Lieu de naissance",
        labelPrincipal: "Directeur",
        labelValid: "Valide",
        labelExpiry: "Valable jusqu'au:",
        statusOnline: "Vérifié en ligne",
        statusOffline: "Vérifié hors ligne",
        revokedTitle: "Carte bloquée",
        revokedDesc: "Cette carte d'étudiant numérique a été désactivée ou bloquée par l'administration. Veuillez contacter le bureau.",
        expiredTitle: "Carte expirée",
        expiredDesc: "Cette carte d'étudiant numérique a expiré. Veuillez vous connecter à Internet pour la renouveler.",
        noPhotoTitle: "Aucune photo",
        noPhotoDesc: "Aucune photo d'identité n'a encore été téléchargée. Veuillez télécharger une photo dans votre profil pour l'activer.",
        photoPendingTitle: "Photo en cours d'examen",
        photoPendingDesc: "Votre photo téléchargée est en cours d'examen par l'administration. La carte sera activée une fois approuvée."
      }
    };

    let currentLang = localStorage.getItem('mso_card_lang') || 'de';
    let cardData = null;
    let qrGenerator = null;

    // Switch Language Handler
    function switchLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('mso_card_lang', lang);
      
      // Update buttons active state
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText.toLowerCase() === lang) btn.classList.add('active');
      });

      // Translate text fields in DOM
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.innerText = translations[lang][key];
        }
      });

      // Re-trigger layout checks for error messages if data is loaded
      if (cardData) {
        renderCard(cardData, !navigator.onLine);
      }
    }

    // Interactive 3D Card Hover & Tilting
    const cardFrame = document.getElementById('card-frame');
    const card = document.getElementById('student-card');
    const hologram = document.getElementById('hologram');

    cardFrame.addEventListener('mousemove', (e) => {
      const rect = cardFrame.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width/2;
      const y = e.clientY - rect.top - rect.height/2;
      
      const tiltX = (y / (rect.height/2)) * 12;
      const tiltY = -(x / (rect.width/2)) * 12;

      card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
      hologram.style.transform = `translateZ(20px) rotate(${tiltY * 2}deg)`;
    });

    cardFrame.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
      hologram.style.transform = 'translateZ(0px) rotate(0deg)';
    });

    // Gyroscope tilt effect (DeviceOrientation)
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        const beta = e.beta;  
        const gamma = e.gamma; 
        
        if (beta && gamma) {
          const tiltX = Math.min(Math.max(beta - 45, -15), 15);
          const tiltY = Math.min(Math.max(gamma, -15), 15);

          card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
          hologram.style.transform = `translateZ(20px) rotate(${tiltY * 2}deg)`;
        }
      });
    }

    // Live-Clock Ticker
    function updateClock() {
      const now = new Date();
      const hrs = String(now.getHours()).padStart(2, '0');
      const mins = String(now.getMinutes()).padStart(2, '0');
      const secs = String(now.getSeconds()).padStart(2, '0');
      const ms = String(now.getMilliseconds()).padStart(3, '0');
      
      document.getElementById('ticker-time').innerText = `${hrs}:${mins}:${secs}.${ms}`;
      requestAnimationFrame(updateClock);
    }
    requestAnimationFrame(updateClock);

    // Fetch Card Data
    async function loadCardData() {
      try {
        const res = await fetch('api/student/card');
        if (!res.ok) throw new Error('Nicht autorisiert.');
        
        const data = await res.json();
        cardData = data;
        
        localStorage.setItem('mso_cached_card', JSON.stringify(data));
        renderCard(data, false);
      } catch (err) {
        console.warn('Online-Abruf fehlgeschlagen, lade cached data:', err);
        const cached = localStorage.getItem('mso_cached_card');
        if (cached) {
          cardData = JSON.parse(cached);
          renderCard(cardData, true);
        } else {
          document.getElementById('card-name').innerText = 'Kein Cache vorhanden';
        }
      }
    }

    function renderCard(data, isOffline) {
      // 1. Theme Farbe anwenden
      if (data.card_primary_color) {
        document.documentElement.style.setProperty('--accent', data.card_primary_color);
        document.documentElement.style.setProperty('--accent-glow', data.card_primary_color + '40');
      }

      // 2. Schultitel & Logo
      document.getElementById('school-title-display').innerText = data.card_school_name || 'Modellschule Obersberg';
      const logoContainer = document.getElementById('school-logo-container');
      if (data.card_logo) {
        logoContainer.innerHTML = `<img src="${data.card_logo}" class="school-logo-img" alt="Logo">`;
      } else {
        logoContainer.innerHTML = `<div class="school-logo-placeholder"><i class="fa-solid fa-graduation-cap"></i></div>`;
      }

      // 3. Personendaten befüllen
      document.getElementById('card-name').innerText = `${data.last_name}, ${data.first_name}`;
      document.getElementById('card-birthplace').innerText = data.birth_place || '-';
      
      // Geburtsdatum
      let birthStr = '-';
      if (data.birth_date) {
        const parts = data.birth_date.split('-');
        if (parts.length === 3) {
          birthStr = `${parts[2]}.${parts[1]}.${parts[0]}`;
        } else {
          birthStr = data.birth_date;
        }
      }
      document.getElementById('card-birth').innerText = birthStr;
      
      // Ablaufdatum
      if (data.expires_at) {
        const parts = data.expires_at.split('-');
        document.getElementById('card-expiry').innerText = `${parts[2]}.${parts[1]}.${parts[0]}`;
      }
      
      // 4. Passbild befüllen
      const imgContainer = document.getElementById('card-photo-container');
      if (data.card_image) {
        imgContainer.innerHTML = `<img src="${data.card_image}" alt="Portrait">`;
      } else {
        imgContainer.innerHTML = `<div class="placeholder-avatar"><i class="fa-solid fa-user"></i></div>`;
      }

      // 5. Schulleiter-Unterschrift & Name
      document.getElementById('principal-name-display').innerText = data.card_principal_name || 'Schulleiter/in';
      const sigContainer = document.getElementById('signature-container');
      if (data.card_signature) {
        sigContainer.innerHTML = `<img src="${data.card_signature}" class="signature-img" alt="Unterschrift">`;
      } else {
        sigContainer.innerHTML = `<span class="signature-placeholder">Unterschrift</span>`;
      }

      // 6. QR-Code für Mediotheksnummer generieren (falls Library geladen)
      const qrBox = document.getElementById('qrcode-box');
      if (typeof QRCode !== 'undefined' && data.mediothek_number) {
        qrBox.innerHTML = '';
        qrGenerator = new QRCode(qrBox, {
          text: data.mediothek_number,
          width: 64,
          height: 64,
          colorDark : "#000000",
          colorLight : "#ffffff",
          correctLevel : QRCode.CorrectLevel.M
        });
      } else {
        qrBox.innerHTML = `<i class="fa-solid fa-qrcode" style="color:var(--bg-dark); font-size:2rem;"></i>`;
      }

      // 7. Status & Offline Banner
      const offlineBanner = document.getElementById('offline-banner');
      const statusLabel = document.getElementById('card-status-label');
      
      if (isOffline) {
        offlineBanner.style.display = 'flex';
        statusLabel.innerText = translations[currentLang].statusOffline;
        statusLabel.style.color = 'var(--text-secondary)';
      } else {
        offlineBanner.style.display = 'none';
        statusLabel.innerText = translations[currentLang].statusOnline;
        statusLabel.style.color = 'var(--success)';
      }

      // 8. Sperrung, Bildfehler & Ablaufprüfung (Overlay Management)
      const overlay = document.getElementById('revoked-overlay');
      const overlayIcon = document.getElementById('overlay-icon');
      const overlayTitle = document.getElementById('overlay-title');
      const overlayDesc = document.getElementById('overlay-desc');

      const isRevoked = data.card_status === 'Ausweis gesperrt' || data.card_status === 'gesperrt' || data.card_status === 'Ungültig';
      const hasNoImage = !data.card_image;
      const isVerified = data.card_status === 'Bild genehmigt' || 
                         data.card_status === 'genehmigt' || 
                         data.card_status === 'Bild verifiziert' ||
                         data.card_status === 'Bild akzeptiert' ||
                         data.card_status === 'Ausweis gedruckt' ||
                         data.card_status === 'Ausweis ausgegeben';
      const isNotVerified = !isVerified;

      // Check Expiry
      const now = new Date();
      const expiry = new Date(data.expires_at);
      const isExpired = now > expiry;

      if (isRevoked) {
        overlayIcon.className = "fa-solid fa-circle-xmark revoked-icon";
        overlayIcon.style.color = "var(--danger)";
        overlayTitle.innerText = translations[currentLang].revokedTitle;
        overlayDesc.innerText = translations[currentLang].revokedDesc;
        overlay.style.display = 'flex';
      } else if (isExpired) {
        overlayIcon.className = "fa-solid fa-calendar-times revoked-icon";
        overlayIcon.style.color = "var(--danger)";
        overlayTitle.innerText = translations[currentLang].expiredTitle;
        overlayDesc.innerText = translations[currentLang].expiredDesc;
        overlay.style.display = 'flex';
      } else if (hasNoImage) {
        overlayIcon.className = "fa-solid fa-image-portrait revoked-icon";
        overlayIcon.style.color = "var(--accent)";
        overlayTitle.innerText = translations[currentLang].noPhotoTitle;
        overlayDesc.innerText = translations[currentLang].noPhotoDesc;
        overlay.style.display = 'flex';
      } else if (isNotVerified) {
        overlayIcon.className = "fa-solid fa-user-clock revoked-icon";
        overlayIcon.style.color = "#f59e0b";
        overlayTitle.innerText = translations[currentLang].photoPendingTitle;
        overlayDesc.innerText = translations[currentLang].photoPendingDesc;
        overlay.style.display = 'flex';
      } else {
        overlay.style.display = 'none';
      }
    }

    // Start
    switchLanguage(currentLang);
    loadCardData();
  </script>
</body>
</html>
